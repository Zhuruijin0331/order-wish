<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>订单心愿管理</title>
    <style>
        /* 基础样式重置 */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, sans-serif;
        }

        /* 主页容器 */
        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
        }

        /* 文字说明区域 */
        .intro {
            margin: 30px 0;
            line-height: 1.6;
            font-size: 16px;
            color: #333;
        }

        /* 图片展示区域 */
        .image-gallery {
            display: flex;
            gap: 20px;
            margin: 30px 0;
            flex-wrap: wrap;
        }

        .image-item {
            flex: 1;
            min-width: 280px;
            border-radius: 8px;
            overflow: hidden;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }

        .image-item img {
            width: 100%;
            height: 250px;
            object-fit: cover;
            display: block;
        }

        /* 手机号输入区域 */
        .phone-input-section {
            margin: 30px 0;
            padding: 20px;
            background: #f8f9fa;
            border-radius: 8px;
        }

        .phone-input-section h3 {
            margin-bottom: 15px;
            color: #222;
        }

        #phoneInput {
            padding: 12px 15px;
            width: 300px;
            border: 1px solid #ddd;
            border-radius: 4px;
            font-size: 16px;
            margin-right: 10px;
        }

        #searchBtn {
            padding: 12px 20px;
            background: #008060;
            color: white;
            border: none;
            border-radius: 4px;
            font-size: 16px;
            cursor: pointer;
        }

        #searchBtn:hover {
            background: #00664b;
        }

        /* 订单表格区域 */
        .order-table-section {
            margin-top: 30px;
            display: none; /* 默认隐藏 */
        }

        .order-table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 15px;
        }

        .order-table th, .order-table td {
            padding: 12px 15px;
            border: 1px solid #ddd;
            text-align: left;
        }

        .order-table th {
            background: #f8f9fa;
            font-weight: 600;
            color: #222;
        }

        /* 心愿输入框样式 */
        .wish-input {
            width: 250px;
            padding: 8px 10px;
            border: 1px solid #ddd;
            border-radius: 4px;
            font-size: 14px;
            color: #333;
            /* 提示文字样式 */
            placeholder: #999;
        }

        .wish-input:focus {
            outline: none;
            border-color: #008060;
            box-shadow: 0 0 0 2px rgba(0,128,96,0.1);
        }

        /* 错误提示 */
        .error-message {
            color: #d72c0d;
            margin-top: 10px;
            display: none;
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- 文字说明 -->
        <div class="intro">
            <h2>欢迎使用订单心愿管理系统</h2>
            <p>请输入您的手机号码，查询您的Shopify订单信息。您可以为每个订单添加不超过30个字的心愿，我们会尽力满足您的需求。</p>
        </div>

        <!-- 三张图片 -->
        <div class="image-gallery">
            <div class="image-item">
                <img src="https://via.placeholder.com/600x400?text=图片1" alt="展示图片1">
            </div>
            <div class="image-item">
                <img src="https://via.placeholder.com/600x400?text=图片2" alt="展示图片2">
            </div>
            <div class="image-item">
                <img src="https://via.placeholder.com/600x400?text=图片3" alt="展示图片3">
            </div>
        </div>

        <!-- 手机号输入区域 -->
        <div class="phone-input-section">
            <h3>查询您的订单</h3>
            <input type="tel" id="phoneInput" placeholder="请输入您的手机号码" maxlength="11">
            <button id="searchBtn">查询订单</button>
            <div class="error-message" id="errorMsg">请输入有效的11位手机号码</div>
        </div>

        <!-- 订单表格区域 -->
        <div class="order-table-section" id="orderTableSection">
            <h3>您的订单信息</h3>
            <table class="order-table" id="orderTable">
                <thead>
                    <tr>
                        <th>人名</th>
                        <th>电话</th>
                        <th>地址</th>
                        <th>订单号</th>
                        <th>心愿（最多30字）</th>
                    </tr>
                </thead>
                <tbody id="orderTableBody">
                    <!-- 动态填充订单数据 -->
                </tbody>
            </table>
        </div>
    </div>

    <script>
        // 获取DOM元素
        const phoneInput = document.getElementById('phoneInput');
        const searchBtn = document.getElementById('searchBtn');
        const errorMsg = document.getElementById('errorMsg');
        const orderTableSection = document.getElementById('orderTableSection');
        const orderTableBody = document.getElementById('orderTableBody');

        // 手机号验证函数
        function validatePhone(phone) {
            const reg = /^1[3-9]\d{9}$/;
            return reg.test(phone);
        }

        // 查询订单函数
        async function searchOrders(phone) {
            try {
                // 调用后端接口获取订单数据
                const response = await fetch(`/api/orders?phone=${phone}`, {
                    method: 'GET',
                    headers: {
                        'Content-Type': 'application/json'
                    }
                });

                if (!response.ok) {
                    throw new Error('查询失败，请稍后重试');
                }

                const data = await response.json();
                
                // 清空表格
                orderTableBody.innerHTML = '';

                if (data.length === 0) {
                    orderTableBody.innerHTML = '<tr><td colspan="5" style="text-align:center;">未查询到相关订单</td></tr>';
                    orderTableSection.style.display = 'block';
                    return;
                }

                // 填充表格数据
                data.forEach(order => {
                    const tr = document.createElement('tr');
                    tr.innerHTML = `
                        <td>${order.customerName || '未知'}</td>
                        <td>${order.phone || '未知'}</td>
                        <td>${order.address || '未知'}</td>
                        <td>${order.orderNumber || '未知'}</td>
                        <td>
                            <input type="text" class="wish-input" 
                                   placeholder="输入30字以内的心愿*" 
                                   maxlength="30">
                        </td>
                    `;
                    orderTableBody.appendChild(tr);
                });

                // 显示表格区域
                orderTableSection.style.display = 'block';

            } catch (error) {
                alert(error.message);
            }
        }

        // 绑定查询按钮点击事件
        searchBtn.addEventListener('click', () => {
            const phone = phoneInput.value.trim();
            
            // 验证手机号
            if (!validatePhone(phone)) {
                errorMsg.style.display = 'block';
                return;
            }
            
            // 隐藏错误提示
            errorMsg.style.display = 'none';
            
            // 查询订单
            searchOrders(phone);
        });

        // 输入框回车触发查询
        phoneInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                searchBtn.click();
            }
        });
    </script>
</body>
</html>
